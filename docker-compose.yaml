# Separate compose file for the AI workflow generation service.
#
# It joins the network created by the main Vizru compose project. Compose
# prefixes network names with the project name (folder name by default), so
# the platform's `vizru-network` is actually `vizru-docker_vizru-network`.
# Override VIZRU_NETWORK if your project name differs:
#   docker network ls | findstr vizru
#   VIZRU_NETWORK=<actual-name> docker compose up -d
#
# Start after the platform is up:
#   docker compose -f workflow-ai/docker-compose.yaml up -d --build

services:
  workflow-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-ai
    restart: unless-stopped
    environment:
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - MONGO_URL=${MONGO_URL:-}
      - MYSQL_HOST=${MYSQL_HOST:-receiver-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DB=${MYSQL_DB:-vizru}
      - MYSQL_USER=${MYSQL_USER:-vizru}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-vizru}
    ports:
      - "5003:5003"          # host access for testing; internal callers use http://workflow-ai:5003
    networks:
      - vizru-network

networks:
  vizru-network:
    external: true
    name: ${VIZRU_NETWORK:-vizru-docker_vizru-network}
